services:
  frontend:
    container_name: ai_frontend
    build:
      context: ./Frontend/AI INTERVIEW
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:5000/api
      - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}

  backend:
    container_name: ai_backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    depends_on:
      - ai_service
    environment:
      - MONGO_DB_URI=${MONGO_DB_URI}
      - PORT=5000
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - AI_SERVICE_URL=http://ai_service:8000

  ai_service:
    container_name: ai_service
    build:
      context: ./ai_Service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - AI_SERVICE_PORT=8000
      - OLLAMA_MODEL_NAME=mistral

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=aiinterview
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
